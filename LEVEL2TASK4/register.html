<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🌸 Register</h1>

            <p>Create Your Account</p>

            <input
                type="email"
                id="registerEmail"
                placeholder="Email">

            <input
                type="password"
                id="registerPassword"
                placeholder="Password">

            <button onclick="registerUser()">
                Register
            </button>

            <p class="link">

                Already Registered?

                <a href="index.html">
                    Login Here
                </a>

            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
