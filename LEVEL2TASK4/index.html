<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🌸 Lumora</h1>

            <p>Welcome Back!</p>

            <input
                type="email"
                id="loginEmail"
                placeholder="Email">

            <input
                type="password"
                id="loginPassword"
                placeholder="Password">

            <button onclick="loginUser()">
                Login
            </button>

            <p class="link">
                New User?
                <a href="register.html">
                    Register Here
                </a>
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
